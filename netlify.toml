# Apex Academy GCSE — Netlify build & SPA routing
[build]
  command = "npm run build"
  publish = "dist"

# Single-page app: every path falls back to index.html so client routing works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Keep preview/branch deploys isolated from production
[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview]
  command = "npm run build"
