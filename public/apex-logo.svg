<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Apex Academy">
  <defs>
    <!-- Brand-blue badge finish (from the Apex tile set: brand #1B2A6B) -->
    <radialGradient id="apex-tile" cx="32%" cy="20%" r="115%">
      <stop offset="0" stop-color="#2c3d8f"/>
      <stop offset="0.6" stop-color="#1B2A6B"/>
      <stop offset="1" stop-color="#0d1640"/>
    </radialGradient>
    <!-- Champagne-gold mark -->
    <linearGradient id="apex-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecdaab"/>
      <stop offset="0.5" stop-color="#c2a86a"/>
      <stop offset="1" stop-color="#a3863f"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#apex-tile)"/>
  <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="11.25" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
  <!-- summit "A" — champagne gold -->
  <path d="M24 9 L39 37.5 L29.25 37.5 L24 26.25 L18.75 37.5 L9 37.5 Z" fill="url(#apex-gold)"/>
  <!-- inner peak — champagne highlight (shine) -->
  <path d="M24 9 L29.25 19.5 L18.75 19.5 Z" fill="#f0e4c4"/>
</svg>
